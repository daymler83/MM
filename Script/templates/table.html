<!DOCTYPE html>
<html>
<head>
    <title>Tabla</title>
</head>
<body>

<h2>Presupuesto</h2>

<table border="1">
    <tr>
        <th>Item</th>
        <th>Glosa</th>
        <th>Unidad</th>
        <th>Cantidad</th>
        <th>Precio</th>
        <th>Total</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[4] }}</td>
        <td>{{ "%.2f"|format(row[5] or 0) }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
